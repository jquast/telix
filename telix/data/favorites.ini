# Favorites - bundled server list for --reinit
#
# Each section is a server entry.  The section name becomes the display
# name in the server list.  All favorites are automatically bookmarked.
#
# Fields:
#   host       (required) hostname or IP
#   port       (optional) default: 23
#   type       (optional) "bbs" or "mud", default: "mud"
#   ssl        (optional) yes/no, default: no
#   encoding   (optional) override the type default

