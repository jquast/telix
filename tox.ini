[tox]
ignore_basepython_conflict = True
skip_missing_interpreters = True
envlist =
    py{39,310,311,312,313,314}
    black
    docformatter
    isort
    pylint
    pylint_tests
    flake8
    flake8_tests
    pydocstyle
    mypy


####### Python Test Environments #######

[testenv]
basepython = python3.13
setenv =
    TERM = xterm-256color
passenv =
    PYTHONASYNCIODEBUG
deps =
    pexpect
    pytest
    pytest-asyncio>=0.21
    pytest-cov
    pytest-timeout
    pytest-xdist
    trustme
usedevelop = True
commands =
    pytest {posargs:--strict-markers --verbose --durations=10} telix/tests


####### Linting and Formatting Environments #######

[testenv:black]
deps =
    black
commands =
    black telix/

[testenv:docformatter]
basepython = python3.13
deps =
    docformatter>=1.7.7
    untokenize
commands =
    docformatter \
        --in-place \
        --recursive \
        --pre-summary-newline \
        --wrap-summaries=100 \
        --wrap-descriptions=100 \
        {toxinidir}/telix/

[testenv:docformatter_check]
basepython = python3.13
deps =
    docformatter>=1.7.7
    untokenize
commands =
    docformatter \
        --check \
        --diff \
        --recursive \
        --pre-summary-newline \
        --wrap-summaries=100 \
        --wrap-descriptions=100 \
        {toxinidir}/telix/

[testenv:flake8]
deps =
    flake8
commands =
    flake8 --exclude=tests telix/

[testenv:flake8_tests]
deps =
    flake8
commands =
    # F811: pytest fixtures appear as redefinitions
    # E402: imports after conftest fixtures
    # E712: comparison to False in tests is intentional
    flake8 --ignore=W504,F401,E501,F811,E402,E712,F841,W503,E203 telix/tests/

[testenv:isort]
deps =
    isort
commands =
    isort telix

[testenv:isort_check]
deps =
    isort
commands =
    isort --diff --check-only telix

[testenv:mypy]
deps =
    mypy
commands =
    mypy telix

[testenv:pydocstyle]
deps =
    pydocstyle
    restructuredtext_lint
    doc8
    pygments
commands =
    pydocstyle --source --explain {toxinidir}/telix
    rst-lint README.rst
    doc8 --ignore-path docs/_build --ignore D000 docs

[testenv:pylint]
deps =
    pylint
    blessed>=1.20
    textual>=0.44
commands =
    pylint {posargs} telix --ignore=tests

[testenv:pylint_tests]
deps =
    {[testenv]deps}
    pylint
commands =
    pylint \
        --disable=missing-function-docstring \
        --disable=missing-module-docstring \
        --disable=missing-class-docstring \
        --disable=unused-variable \
        --disable=unnecessary-dunder-call \
        --disable=unused-import \
        --disable=attribute-defined-outside-init \
        --disable=redefined-outer-name \
        --disable=unpacking-non-sequence \
        --disable=possibly-used-before-assignment \
        --disable=comparison-with-callable \
        {posargs} telix/tests

[testenv:codespell]
deps =
    codespell
commands =
    codespell --skip="*.pyc,*.log,*.debug,typescript*,htmlcov*,_build,build,*.egg-info,.tox,.git" \
              --ignore-words-list="wont,nams,flushin,thirdparty,lient,caf,alo,implementor,untils,hel,vor,ofo,drastical,dum" \
              --uri-ignore-words-list "*" \
              --summary --count

[testenv:format]
deps =
    {[testenv:isort]deps}
    {[testenv:black]deps}
    {[testenv:docformatter]deps}
commands =
    {[testenv:isort]commands}
    {[testenv:black]commands}
    {[testenv:docformatter]commands}

[testenv:lint]
deps =
    {[testenv:flake8]deps}
    {[testenv:isort_check]deps}
    {[testenv:pydocstyle]deps}
    {[testenv:pylint]deps}
    {[testenv:codespell]deps}
commands =
    {[testenv:flake8]commands}
    {[testenv:flake8_tests]commands}
    {[testenv:isort_check]commands}
    {[testenv:pydocstyle]commands}
    {[testenv:pylint]commands}
    {[testenv:codespell]commands}


####### Documentation #######

[testenv:docs]
deps =
    -r{toxinidir}/docs/requirements.txt
usedevelop = True
commands =
    sphinx-build -W -b html {toxinidir}/docs {toxinidir}/docs/_build/html


####### Tool Configs #######

[coverage:run]
branch = True
parallel = True
source = telix
omit = telix/tests/*
relative_files = True

[coverage:report]
precision = 1
exclude_lines =
    pragma: no cover
omit = telix/tests/*

[coverage:paths]
source = telix/

[doc8]
max-line-length = 100

[flake8]
max-line-length = 100
exclude = .tox,build
# E203: whitespace before ':' - conflicts with black's slice formatting
# W503: line break before binary operator - conflicts with black (PEP 8 now recommends this)
# E704: abstract method stub on one line - conflicts with black
ignore = E203, W503, E704

[isort]
profile = black
line_length = 100
length_sort = 1
import_heading_stdlib = std imports
import_heading_thirdparty = 3rd party
import_heading_firstparty = local
import_heading_localfolder = local
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
no_lines_before = LOCALFOLDER
indented_import_headings = false
atomic = true

[pydocstyle]
ignore =
    D101,
    D102,
    D103,
    D105,
    D107,
    D203,
    D204,
    D212,
    D401

[pytest]
norecursedirs = .git .tox build
asyncio_mode = auto
log_level = debug
log_format = %(levelname)8s %(filename)s:%(lineno)s %(message)s
addopts =
    --strict-markers
    --verbose
    --capture=no
    -n auto
    -p no:benchmark
    --color=yes
    --cov
    --cov-append
    --cov-report=xml
    --disable-pytest-warnings
    --ignore=setup.py
    --ignore=.tox
    --durations=10
    --timeout=15
    --junit-xml=.tox/results.{envname}.xml
faulthandler_timeout = 30
filterwarnings =
junit_family = xunit1
